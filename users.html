<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <link rel="icon" type="image/jpeg" href="Logo.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المستخدمين - نظام الإدارة</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/auth.js"></script>
</head>

<body>
  <main class="main-content">
    <div class="page-header">
      <h1 style="display:flex; align-items:center; gap:0.6rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round" style="width:28px;height:28px;flex-shrink:0;">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
          <path d="M16 3.13a4 4 0 010 7.75" opacity="0.3" />
        </svg>
        إدارة المستخدمين
      </h1>
      <button class="btn btn-primary" onclick="openModal('create-user-modal')" style="gap:0.5rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round" style="width:18px;height:18px;">
          <path d="M12 5v14M5 12h14" />
        </svg>
        حساب جديد
      </button>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>قائمة المستخدمين</h2>
      </div>
      <div class="card-body">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>الاسم / البريد</th>
                <th>الدور</th>
                <th>تاريخ الإنشاء</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <tr>
                <td colspan="4" style="text-align:center;color:var(--text-muted)">جاري التحميل...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="create-user-modal" class="modal-overlay hidden">
      <div class="modal" style="max-width: 650px;">
        <div class="modal-header">
          <h3>حساب جديد</h3>
          <button class="btn btn-secondary btn-sm" onclick="closeModal('create-user-modal')" style="padding:0.5rem">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <form id="create-user-form">
            <div class="form-group" style="margin-bottom: 1rem;">
              <label for="new-user-name">الاسم الكامل *</label>
              <input type="text" id="new-user-name" required placeholder="مثال: أحمد محمد">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label for="new-user-email">البريد الإلكتروني *</label>
              <input type="email" id="new-user-email" required placeholder="example@email.com">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label for="new-user-password">كلمة المرور *</label>
              <input type="password" id="new-user-password" required minlength="6" placeholder="على الأقل 6 أحرف">
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
              <label for="new-user-role"
                style="display:block; margin-bottom:0.8rem; font-weight:800; color:var(--primary);">الرتبة :</label>
              <select id="new-user-role" required onchange="applyDefaultPermissions('new')"
                style="width:100%; padding:0.8rem; border-radius:var(--radius); border:1px solid var(--border);">
                <option value="admin">المدير العام (المالك)</option>
                <option value="executive_director">مدير تنفيذي</option>
                <option value="designer">مصمم</option>
                <option value="employee">موظف</option>
              </select>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
              <label style="display:block; margin-bottom:0.8rem; font-weight:800; color:var(--primary);">صلاحيات الوصول
                للأقسام :</label>
              <div id="new-permissions-grid"
                style="border: 1px solid var(--border); border-radius: var(--radius); padding: 0.8rem; background: var(--bg-color); max-height: 250px; overflow-y: auto;">
                <!-- Will be populated dynamically -->
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" onclick="submitCreateUser()">إنشاء الحساب</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal('create-user-modal')">إلغاء</button>
        </div>
      </div>
    </div>

    <div id="edit-permissions-modal" class="modal-overlay hidden">
      <div class="modal" style="max-width: 650px;">
        <div class="modal-header">
          <h3 id="edit-perms-title">تعديل رتبة وصلاحيات المستخدم</h3>
          <button class="btn btn-secondary btn-sm" onclick="closeModal('edit-permissions-modal')"
            style="padding:0.5rem">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <form id="edit-perms-form">
            <input type="hidden" id="edit-user-id">
            <div class="form-group" style="margin-bottom: 1.5rem;">
              <label for="edit-user-name"
                style="display:block; margin-bottom:0.8rem; font-weight:800; color:var(--primary);">الاسم الكامل
                :</label>
              <input type="text" id="edit-user-name" required placeholder="مثال: أحمد محمد"
                style="width:100%; padding:0.8rem; border-radius:var(--radius); border:1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
              <label for="edit-user-role"
                style="display:block; margin-bottom:0.8rem; font-weight:800; color:var(--primary);">الرتبة :</label>
              <select id="edit-user-role" required onchange="applyDefaultPermissions('edit')"
                style="width:100%; padding:0.8rem; border-radius:var(--radius); border:1px solid var(--border);">
                <option value="admin">المدير العام (المالك)</option>
                <option value="executive_director">مدير تنفيذي</option>
                <option value="designer">مصمم</option>
                <option value="employee">موظف</option>
              </select>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
              <label style="display:block; margin-bottom:0.8rem; font-weight:800; color:var(--primary);">صلاحيات الوصول
                للأقسام :</label>
              <div id="edit-permissions-grid"
                style="border: 1px solid var(--border); border-radius: var(--radius); padding: 0.8rem; background: var(--bg-color); max-height: 250px; overflow-y: auto;">
                <!-- Will be populated dynamically -->
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" onclick="submitUpdatePermissions()">حفظ التعديلات</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal('edit-permissions-modal')">إلغاء</button>
        </div>
      </div>
    </div>

    <script>
      const SECTIONS = [
        { id: 'orders', name: 'طلبيات العملاء', page: 'client_orders.html' },
        { id: 'orders_history', name: 'سجل الطلبيات', page: 'orders_history.html' },
        { id: 'tasks', name: 'قائمة المهام', page: 'tasks.html' },
        { id: 'progress', name: 'متابعة التقدم', page: 'progress.html' },
        { id: 'inventory', name: 'المخازن', page: 'inventory.html' },
        { id: 'purchasing', name: 'المشتريات', page: 'purchasing.html' },
        { id: 'pricing', name: 'التسعير', page: 'pricing.html' },
        { id: 'profits', name: 'الأرباح والمصروفات', page: 'profits.html' },
        { id: 'accounts', name: 'الحسابات', page: 'accounts.html' },
        { id: 'customers', name: 'العملاء', page: 'customers.html' },
        { id: 'workers', name: 'شؤون العمال', page: 'workers.html' },
        { id: 'users', name: 'المستخدمين', page: 'users.html' }
      ];

      const ROLE_DEFAULTS = {
        executive_director: {
          orders: 'full', orders_history: 'full', tasks: 'full', progress: 'full',
          inventory: 'full', purchasing: 'full', pricing: 'full', profits: 'full',
          accounts: 'full', customers: 'full', workers: 'full', users: 'full'
        },
        general_manager: {
          orders: 'full', orders_history: 'full', tasks: 'full', progress: 'full',
          inventory: 'full', purchasing: 'full', pricing: 'full', profits: 'full',
          accounts: 'full', customers: 'full', workers: 'full', users: 'none'
        },
        designer: {
          orders: 'read', orders_history: 'read', tasks: 'full', progress: 'full',
          inventory: 'none', purchasing: 'none', pricing: 'none', profits: 'none',
          accounts: 'none', customers: 'none', workers: 'none', users: 'none'
        },
        employee: {
          orders: 'read', orders_history: 'read', tasks: 'full', progress: 'full',
          inventory: 'none', purchasing: 'none', pricing: 'none', profits: 'none',
          accounts: 'none', customers: 'none', workers: 'none', users: 'none'
        }
      };

      function renderPermissionsGrid(containerId, prefix) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let html = `<table style="width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: right;">
            <thead><tr style="border-bottom: 2px solid var(--border);">
              <th style="padding: 0.5rem; font-weight: bold;">القسم</th>
              <th style="padding: 0.5rem; font-weight: bold; text-align: center;">مخفي</th>
              <th style="padding: 0.5rem; font-weight: bold; text-align: center;">عرض فقط</th>
              <th style="padding: 0.5rem; font-weight: bold; text-align: center;">كاملة</th>
            </tr></thead><tbody>`;
        SECTIONS.forEach(s => {
          html += `<tr style="border-bottom: 1px solid var(--border-light);">
              <td style="padding: 0.6rem 0.5rem; font-weight: 600;">${s.name}</td>
              <td style="padding: 0.6rem 0.5rem; text-align: center;"><input type="radio" name="${prefix}-perm-${s.id}" value="none" checked style="cursor: pointer; width: 16px; height: 16px;"></td>
              <td style="padding: 0.6rem 0.5rem; text-align: center;"><input type="radio" name="${prefix}-perm-${s.id}" value="read" style="cursor: pointer; width: 16px; height: 16px;"></td>
              <td style="padding: 0.6rem 0.5rem; text-align: center;"><input type="radio" name="${prefix}-perm-${s.id}" value="full" style="cursor: pointer; width: 16px; height: 16px;"></td>
            </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      function applyDefaultPermissions(prefix) {
        const role = document.getElementById(`${prefix}-user-role`)?.value;
        const defaults = ROLE_DEFAULTS[role];
        if (!defaults) {
          if (role === 'admin') {
            SECTIONS.forEach(s => {
              const radio = document.querySelector(`input[name="${prefix}-perm-${s.id}"][value="full"]`);
              if (radio) radio.checked = true;
            });
          }
          return;
        }
        SECTIONS.forEach(s => {
          const val = defaults[s.id] || 'none';
          const radio = document.querySelector(`input[name="${prefix}-perm-${s.id}"][value="${val}"]`);
          if (radio) radio.checked = true;
        });
      }

      function getSelectedPermissions(prefix) {
        const perms = {};
        SECTIONS.forEach(s => {
          perms[s.id] = document.querySelector(`input[name="${prefix}-perm-${s.id}"]:checked`)?.value || 'none';
        });
        return perms;
      }

      function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
      function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

      async function openEditPermissionsModal(userId, fullName, currentRole) {
        document.getElementById('edit-user-id').value = userId;
        document.getElementById('edit-perms-title').textContent = `تعديل رتبة وصلاحيات: ${fullName}`;
        document.getElementById('edit-user-name').value = fullName;
        document.getElementById('edit-user-role').value = currentRole;
        try {
          const { data } = await getSupabase().from('profiles').select('permissions, full_name, role').eq('id', userId).single();
          if (data && data.full_name) {
            document.getElementById('edit-user-name').value = data.full_name;
            document.getElementById('edit-perms-title').textContent = `تعديل رتبة وصلاحيات: ${data.full_name}`;
          }
          const perms = data?.permissions || {};
          const role = data?.role || currentRole;

          SECTIONS.forEach(s => {
            let val = perms[s.id];
            // If the permission is not explicitly set, show the effective default for their role
            if (val === undefined || val === null) {
              if (role === 'admin') {
                val = 'full';
              } else {
                val = ROLE_DEFAULTS[role]?.[s.id] || 'none';
              }
            }

            const radio = document.querySelector(`input[name="edit-perm-${s.id}"][value="${val}"]`);
            if (radio) radio.checked = true;
          });
        } catch (e) { applyDefaultPermissions('edit'); }
        openModal('edit-permissions-modal');
      }

      async function submitUpdatePermissions() {
        const userId = document.getElementById('edit-user-id').value;
        const fullName = document.getElementById('edit-user-name').value.trim();
        const role = document.getElementById('edit-user-role').value;
        const permissions = getSelectedPermissions('edit');
        try {
          showAlert('جاري التحديث...', 'pending');
          const sb = getSupabase();

          const { error } = await sb.from('profiles').update({ role, full_name: fullName, permissions }).eq('id', userId);
          if (error) throw error;

          // Sync name to workers table if linked
          await sb.from('workers').update({ name: fullName }).eq('profile_id', userId);

          showAlert('تم التحديث بنجاح!', 'success');
          closeModal('edit-permissions-modal');
          await initUsersPage();
        } catch (e) { showAlert('فشل التحديث: ' + e.message, 'error'); }
      }

      async function submitCreateUser() {
        const form = document.getElementById('create-user-form');
        if (!form.checkValidity()) { form.reportValidity(); return; }
        const name = document.getElementById('new-user-name').value;
        const email = document.getElementById('new-user-email').value;
        const password = document.getElementById('new-user-password').value;
        const role = document.getElementById('new-user-role').value;
        const permissions = getSelectedPermissions('new');
        try {
          showAlert('جاري الإنشاء...', 'pending');
          const tempSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: false, autoRefreshToken: false }
          });
          const { data, error } = await tempSupabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
          if (error) throw error;
          await getSupabase().from('profiles').update({ role, full_name: name, permissions }).eq('id', data.user.id);
          showAlert('تم بنجاح!', 'success');
          closeModal('create-user-modal');
          form.reset();
          applyDefaultPermissions('new');
          await initUsersPage();
        } catch (e) { showAlert('فشل: ' + e.message, 'error'); }
      }

      async function initUsersPage() {
        await initAuth();
        const profiles = await getProfiles();
        const tbody = document.getElementById('users-table-body');
        tbody.innerHTML = profiles.length ? '' : `<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">لا يوجد مستخدمين</td></tr>`;
        profiles.forEach(p => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td><div style="font-weight:600">${p.full_name || '-'}</div><div style="font-size:0.75rem;color:var(--text-muted)">${p.email}</div></td>
            <td><span class="badge badge-${p.role === 'admin' ? 'completed' : 'in_progress'}">${getRoleLabel(p.role)}</span></td>
            <td>${new Date(p.created_at).toLocaleDateString('ar-EG')}</td>
            <td><div style="display:flex; gap:0.5rem; justify-content:center;">
              <button onclick="openEditPermissionsModal('${p.id}', '${p.full_name || p.email}', '${p.role}')" class="btn btn-secondary btn-sm" style="background:var(--primary); color:white; border:none;">تعديل الصلاحيات</button>
              <button onclick="deleteUserAccount('${p.id}')" class="btn btn-sm" style="background:#fee2e2; color:#dc2626; border:none;">حذف</button>
            </div></td>`;
          tbody.appendChild(tr);
        });
      }

      async function deleteUserAccount(userId) {
        if (!(await customConfirm('هل أنت متأكد؟'))) return;
        try {
          await getSupabase().from('profiles').delete().eq('id', userId);
          showAlert('تم الحذف', 'success');
          await initUsersPage();
        } catch (e) { showAlert('فشل: ' + e.message, 'error'); }
      }

      document.addEventListener('DOMContentLoaded', () => {
        renderPermissionsGrid('new-permissions-grid', 'new');
        renderPermissionsGrid('edit-permissions-grid', 'edit');
        applyDefaultPermissions('new');
        initUsersPage();
      });
    </script>
</body>

</html>
